<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moeezland Elections System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f0f2f5; }
.header {
  background-color: #ffffff;
  padding: 1rem;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-logo { height: 60px; }
.header-title { font-size: 1.75rem; font-weight: bold; color: #333; }
.holding-page { text-align: center; padding: 5rem 1rem; }
</style>
</head>

<body>

<header class="header">
  <img src="flag.png" class="header-logo">
  <h1 class="header-title">Moeezland Elections System</h1>
  <div>
    <img src="logo.png" class="header-logo me-2">
    <button id="logoutBtn" class="btn btn-danger">Logout</button>
  </div>
</header>

<main class="container">

<div class="holding-page">
  <div class="card">
    <div class="card-body">
      <h2 class="card-title">No Active Election</h2>
      <p class="card-text">
        There are currently no active or scheduled elections.
      </p>

      <div class="mt-4">
        <a href="results.html" class="btn btn-primary">
          View Past Election Results
        </a>
      </div>

      <p class="mt-3">Please check back later.</p>
    </div>
  </div>
</div>

</main>

<footer class="text-center text-muted py-4">
  <p>© 2026 Government of Moeezland. All rights reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs-pheSxe9bkAqnhG9qOjF7RvFfb9k00A",
  authDomain: "e-civilian-portal2007.firebaseapp.com",
  projectId: "e-civilian-portal2007",
  storageBucket: "e-civilian-portal2007.firebasestorage.app",
  messagingSenderId: "465001179759",
  appId: "1:465001179759:web:60a45e286fbf1a39ac7b9a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 PROTECT PAGE
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// 🔓 LOGOUT FUNCTION
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};  
</script>
  
</body>
</html>
