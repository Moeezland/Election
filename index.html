<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moeezland Elections System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f0f2f5; }
.header {
  background-color: #ffffff;
  padding: 1rem;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-title {
  margin-left: 10px;
  margin-right: auto;
  font-size: 1.75rem;
  font-weight: bold;
  color: #333;
}  
.header-logo { height: 60px; }
.header-title { font-size: 1.75rem; font-weight: bold; color: #333; }
.holding-page { text-align: center; padding: 5rem 1rem; }

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 768px) {

  .header {
    flex-direction: column;
    text-align: center;
    gap: 10px;
  }

  .header-logo {
    height: 40px;
  }

  .header-title {
    font-size: 1.3rem;
  }

  .holding-page {
    padding: 2rem 1rem;
  }

  .card {
    margin: 10px;
  }

  .chart-container {
    height: 200px;
  }

}
  
</style>
</head>

<body>

<header class="header">
  <img src="logo.png" class="header-logo">
  <h1 class="header-title">Moeezland Elections System</h1>
</header>

<main class="container">

<div class="holding-page">
  <div class="card">
    <div class="card-body text-center">
      <h2 class="card-title">No Active Election</h2>
      <p class="card-text">
        There are currently no active or scheduled elections.
      </p>

      <div class="mt-4">
        <a href="results.html" class="btn btn-primary">
          View Past Election Results
        </a>
      </div>

      <p class="mt-3">Please check back later.</p>
    </div>
  </div>
</div>

</main>

<div class="text-center my-4">
  <button id="logoutBtn" class="btn btn-danger">
    Logout
  </button>
</div>
  
<footer class="text-center text-muted py-4">
  <p>© 2026 Government of Moeezland. All rights reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs-pheSxe9bkAqnhG9qOjF7RvFfb9k00A",
  authDomain: "e-civilian-portal2007.firebaseapp.com",
  projectId: "e-civilian-portal2007"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Protect page
onAuthStateChanged(auth, async (user) => {
  if (user === null) {
    // wait a bit before redirecting
    setTimeout(() => {
      if (!auth.currentUser) {
        window.location.href = "login.html";
      }
    }, 500);
    return;
  }

  // ✅ user is logged in, continue normally

  const docRef = doc(db, "activeElection", "current");
  const docSnap = await getDoc(docRef);

  const container = document.querySelector(".holding-page");

  if (docSnap.exists() && docSnap.data().status === "active") {
    const data = docSnap.data();

    container.innerHTML = `
      <div class="card">
        <div class="card-body">
          <h2 class="card-title">Active Election</h2>
          <p class="card-text">Cast your vote below.</p>

          <div id="voteButtons"></div>
        </div>
      </div>
    `;

    const voteContainer = document.getElementById("voteButtons");

  data.candidates.forEach(candidate => {
  const btn = document.createElement("button");
  btn.className = "btn btn-primary w-100 mb-2 py-2";
  btn.innerText = `Vote for ${candidate}`;

  btn.onclick = async () => {
    const user = auth.currentUser;

    // 🔍 Check if already voted
    const q = query(
      collection(db, "votes"),
      where("userId", "==", user.uid),
      where("electionId", "==", data.id)
    );

    const snapshot = await getDocs(q);

    if (!snapshot.empty) {
      alert("❌ You have already voted!");
      return;
    }

    // ✅ Save vote
    await addDoc(collection(db, "votes"), {
      userId: user.uid,
      candidate: candidate,
      electionId: data.id
    });

    alert("✅ Vote submitted successfully!");

    // 🔒 Disable buttons after voting
    document.querySelectorAll("#voteButtons button").forEach(b => {
      b.disabled = true;
    });
  };

  voteContainer.appendChild(btn);
});

  } else {
    // keep your original "No Active Election"
  }
});

// logout
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};
</script>
  
</body>
</html>
