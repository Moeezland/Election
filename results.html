<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results - Moeezland</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background-color: #f0f2f5; }
.header {
  background-color: #ffffff;
  padding: 1rem;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-logo { height: 60px; }
.header-title { font-size: 1.75rem; font-weight: bold; color: #333; }
.party-logo {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 1rem;
}
</style>
</head>

<body>

<header class="header">
  <img src="flag.png" class="header-logo">
  <h1 class="header-title">Election Results</h1>
  <img src="logo.png" class="header-logo">
</header>

<main class="container py-4">

<div class="alert alert-info">
  <h5>About Vote Verification</h5>
  <p>Results verified by the Monarch of Moeezland ✔</p>
</div>

<div class="card">
<div class="card-header d-flex justify-content-between">
  <div>
    <h4>2026 General Election</h4>
    <small class="text-muted">Concluded on: March 30, 2026</small>
  </div>
  <div>
    <span class="badge bg-success">Verified ✔</span>
    <span class="badge bg-info">Turnout: 75%</span>
  </div>
</div>

<div class="card-body">
<div class="row">

<div class="col-md-6">
<h5 id="totalVotes">Vote Tally (Total Votes: 0)</h5>

<ul id="resultsList" class="list-group"></ul>
</div>

<div class="col-md-6 text-center">
<h5>Vote Distribution</h5>
<canvas id="chart"></canvas>
</div>

</div>
</div>
</div>

</main>

<footer class="text-center text-muted py-4">
  <p>© 2026 Government of Moeezland. All rights reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs-pheSxe9bkAqnhG9qOjF7RvFfb9k00A",
  authDomain: "e-civilian-portal2007.firebaseapp.com",
  projectId: "e-civilian-portal2007",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadResults() {
  const docRef = doc(db, "results", "2026-election");
  const docSnap = await getDoc(docRef);

  if (!docSnap.exists()) return;

  const data = docSnap.data();

  let total = 0;
  let entries = Object.entries(data);

  // 🧮 calculate total votes
  entries.forEach(([name, votes]) => {
    total += votes;
  });

  // 🧾 update total
  document.getElementById("totalVotes").innerText =
    `Vote Tally (Total Votes: ${total})`;

  // 🧾 build list dynamically
  const list = document.getElementById("resultsList");
  list.innerHTML = "";

  let labels = [];
  let values = [];

  entries.forEach(([name, votes]) => {
    const percent = ((votes / total) * 100).toFixed(1);

    labels.push(name);
    values.push(votes);

    const li = document.createElement("li");
    li.className = "list-group-item d-flex justify-content-between";

    li.innerHTML = `
      <div>${name}</div>
      <div>
        <span class="badge bg-primary">${votes} Votes</span>
        <span class="badge bg-secondary">${percent}%</span>
      </div>
    `;

    list.appendChild(li);
  });

  // 📊 chart
  new Chart(document.getElementById('chart'), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: [
          'rgba(54, 162, 235, 0.7)',
          'rgba(255, 99, 132, 0.7)',
          'rgba(255, 206, 86, 0.7)',
          'rgba(75, 192, 192, 0.7)',
          'rgba(153, 102, 255, 0.7)'
        ]
      }]
    }
  });
}

loadResults();
</script>

</body>
</html>
