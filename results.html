<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results - Moeezland</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background-color: #f0f2f5; }
.header {
  background-color: #ffffff;
  padding: 1rem;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
}

.header-title {
  margin-left: 10px;
  margin-right: auto;
  font-size: 1.75rem;
  font-weight: bold;
  color: #333;
}
  
.header-logo { height: 60px; }
.header-title { font-size: 1.75rem; font-weight: bold; color: #333; }
.party-logo {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 1rem;
}
.chart-container {
  height: 250px;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 768px) {

  .header {
    flex-direction: column;
    text-align: center;
    gap: 10px;
  }

  .header-logo {
    height: 40px;
  }

  .header-title {
    font-size: 1.3rem;
  }

  .holding-page {
    padding: 2rem 1rem;
  }

  .card {
    margin: 10px;
  }

  .chart-container {
    height: 200px;
  }

}
  
</style>
</head>

<body>

<header class="header">
  <img src="logo.png" class="header-logo">
  <h1 class="header-title">Election Results</h1>
</header>

<main class="container py-4">

<div class="alert alert-info">
  <h5>About Vote Verification</h5>
  <p>Results verified by the Monarch of Moeezland ✔</p>
</div>

<div class="card-body">
<div id="resultsContainer"></div>
</div>
</div>

</main>

<footer class="text-center text-muted py-4">
  <p>© 2026 Government of Moeezland. All rights reserved.</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs-pheSxe9bkAqnhG9qOjF7RvFfb9k00A",
  authDomain: "e-civilian-portal2007.firebaseapp.com",
  projectId: "e-civilian-portal2007",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadAllResults() {
  const snapshot = await getDocs(collection(db, "results"));

  let elections = [];

  snapshot.forEach(doc => {
    elections.push({
      id: doc.id,
      data: doc.data()
    });
  });

  // 🔥 Sort newest first (by year in ID)
  elections.sort((a, b) => b.id.localeCompare(a.id));

  const container = document.getElementById("resultsContainer");
  container.innerHTML = "";

  elections.forEach(election => {
    const data = election.data;

    let total = 0;
    let entries = Object.entries(data);

    entries.forEach(([_, votes]) => total += votes);

    // 🧱 Create card
    const card = document.createElement("div");
    card.className = "card mb-4";

    let listHTML = "";

    let labels = [];
    let values = [];

    entries.forEach(([name, votes]) => {
      const percent = ((votes / total) * 100).toFixed(1);

      labels.push(name);
      values.push(votes);

      listHTML += `
        <li class="list-group-item d-flex justify-content-between">
          <div>${name}</div>
          <div>
            <span class="badge bg-primary">${votes} Votes</span>
            <span class="badge bg-secondary">${percent}%</span>
          </div>
        </li>
      `;
    });

    card.innerHTML = `
  <div class="card-header d-flex justify-content-between">
    <div>
      <h4>${election.id.replace("-election", "").toUpperCase()} </h4>
      <small class="text-muted">Archived Result</small>
    </div>
    <div>
      <span class="badge bg-success">Verified ✔</span>
    </div>
  </div>

  <div class="card-body">
    <div class="row g-3">

      <!-- LEFT SIDE -->
      <div class="col-12 col-md-6">
        <h5>Vote Tally (Total Votes: ${total})</h5>

        <ul class="list-group">
          ${listHTML}
        </ul>
      </div>

      <!-- RIGHT SIDE -->
      <div class="col-12 col-md-6 text-center">
        <h5>Vote Distribution</h5>
        <div class="chart-container">
          <canvas id="chart-${election.id}"></canvas>
        </div>
      </div>

    </div>
  </div>
`;

    container.appendChild(card);

    // 📊 Chart per election
    new Chart(document.getElementById(`chart-${election.id}`), {
  type: 'pie',
  data: {
    labels: labels,
    datasets: [{
      data: values,
      backgroundColor: [
        'rgba(54, 162, 235, 0.7)',
        'rgba(255, 99, 132, 0.7)',
        'rgba(255, 206, 86, 0.7)',
        'rgba(75, 192, 192, 0.7)'
      ]
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});

  });
}

loadAllResults();
</script>

</body>
</html>
